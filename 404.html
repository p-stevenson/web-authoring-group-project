<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <style>
        @font-face {
            font-family: 'Slackey';
            src: url('fonts/Slackey/Slackey-Regular.ttf') format('truetype');
            font-style: normal;
            font-weight: 400;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #fff;
            color: #f05800;
            text-align: center;
            padding: 24px;
        }

        .error-wrap {
            display: grid;
            gap: 20px;
            justify-items: center;
        }

        .error-wrap img {
            width: min(70vw, 520px);
            height: auto;
        }

        .error-wrap h1 {
            font-family: 'Slackey', Arial, sans-serif;
            font-size: clamp(1.8rem, 4vw, 3rem);
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <main class="error-wrap">
        <img src="images/siberian-husky.svg" alt="Husky">
        <h1>Woof! 404</h1>
    </main>
</body>
</html>
